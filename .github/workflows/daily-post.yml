name: Daily Instagram carousel post

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (log payload, do not publish or advance state)"
        required: false
        default: "false"
      check_only:
        description: "Credential check only (read-only API call, no publish)"
        required: false
        default: "false"
  schedule:
    # Runs every hour; publish.js only actually proceeds on the run that
    # lands at 12:00pm Pacific (HOUR_GATE_PACIFIC below), computed with
    # proper DST awareness so it stays fixed to noon Pacific year-round
    # instead of drifting with a fixed UTC cron time. All other hourly runs
    # are silent no-ops. Also gated by state.json's start_date (2026-07-24),
    # so nothing publishes before then regardless.
    - cron: '0 * * * *'

# Prevents two runs (e.g. a scheduled run + a manual dispatch) from executing
# at the same time and double-publishing. Later runs queue instead of
# overlapping; none are silently dropped.
concurrency:
  group: daily-post
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    # Hard ceiling so a hung run (e.g. stuck polling the Graph API) can't
    # block every subsequent day's queued run indefinitely.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Publish next carousel
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_BUSINESS_ACCOUNT_ID: ${{ secrets.IG_BUSINESS_ACCOUNT_ID }}
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '' }}
          CHECK_CREDENTIALS: ${{ github.event.inputs.check_only == 'true' && '1' || '' }}
          HOUR_GATE_PACIFIC: ${{ github.event_name == 'schedule' && '12' || '' }}
        run: node publish/publish.js

      - name: Commit updated state
        if: ${{ github.event.inputs.dry_run != 'true' && github.event.inputs.check_only != 'true' }}
        run: |
          git config user.name "golden-society-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json
          git diff --quiet --cached || git commit -m "chore: advance to next post [skip ci]"
          git pull --rebase origin main
          git push

# NOTE ON FAILURE VISIBILITY:
# GitHub emails the repo owner by default whenever a scheduled workflow run
# fails (Settings -> Notifications -> Actions -> "Send notifications for
# failed workflows only" is on by default). Confirm that setting is enabled
# on the account that owns this repo so a failed day is never silent.
